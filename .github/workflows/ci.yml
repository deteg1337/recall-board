name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            python3-pytest \
            python3-gi \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            xvfb

      - name: Run tests
        run: xvfb-run python3 -m pytest tests/ -v --ignore=tests/test_install.bats

  install:
    name: Install/uninstall scripts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            bats \
            python3-gi \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            wl-clipboard \
            wtype

      - name: Run install/uninstall tests
        run: bats tests/test_install.bats -t
